<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>NetSurf Minimal Demo</title>
</head>

<body>
    <h1>NetSurf is Running!</h1>
    <p>This page is a minimal demo for the current browser renderer.</p>
    <p>It shows text, <a href="https://example.com/">a link</a>, entities &amp; &lt; &gt;, and spacing.</p>

    <p>Image demo below:</p>
    <img src="/test.bmp" alt="demo image">

    <p>Table demo:</p>
    <table>
        <tr>
            <th>Name</th>
            <th>Value</th>
        </tr>
        <tr>
            <td>Engine</td>
            <td>Hubbub</td>
        </tr>
        <tr>
            <td>Graphics</td>
            <td>libnsfb</td>
        </tr>
    </table>

    <p>Form demo:</p>
    <form>
        <input type="text" name="query" value="hello world">
        <input type="button" value="Submit">
        <textarea>
Line 1
Line 2
        </textarea>
    </form>


    <p>Location: RISC-V Bare-metal OS</p>
</body>

</html>
